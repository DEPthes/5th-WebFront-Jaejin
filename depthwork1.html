<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>depthwork1</title>
  <!-- 외부 CSS 파일 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- ── 1. 상단 라벨: 과제 주차 표시 ── -->
    <div class="top-label">1주차 스터디 과제</div>

    <!-- ── 2. 헤더 배너: 로고 + 브랜드명 ── -->
    <div class="header-banner">
      <img src="천진낭만.svg" alt="천진낭만 이미지">
      <img src="headbaaner.svg" alt="헤드배너 이미지">
    </div>

    <!-- ── 3. 메인 배너 이미지 ── -->
    <div class="banner">
      <img src="Banner.png" alt="배너 이미지">
    </div>

    <!-- ── 4. 공지사항 버튼: 클릭 시 공지 페이지로 이동 ── -->
    <div class="notice-btn">
      <img src="공지사항.svg" alt="공지사항">
      <img src="화살표.svg" alt="화살표">
    </div>

    <!-- ── 5. 포스터 카드: 아티스트 이미지 ── -->
    <div class="poster-card">
      <img src="wor1.png" alt="볼빨간사춘기">
    </div>

    <!-- ── 6. DAY 박스: 오늘의 곡 정보 ── -->
    <div class="day-box">
      <div class="day-label">DAY 2</div>
      <hr />
      <div class="day-song">
        <img src="볼빨간사춘기.svg" alt="볼빨간사춘기 한글">
      </div>
    </div>

    <!-- ── 7. 푸터: 브랜드·SNS·저작권 ── -->
    <footer>
      <!-- 브랜드명 -->
      <div class="footer-brand">DEPth</div>

      <!-- SNS 링크 아이콘 -->
      <div class="social-icons">
        <a href="#"><img src="Square.svg" alt="링크"></a>
        <a href="#"><img src="Square(1).svg" alt="깃허브"></a>
        <a href="#"><img src="Square(2).svg" alt="인스타그램"></a>
        <a href="#"><img src="Square(3).svg" alt="이메일"></a>
      </div>

      <hr />

      <!-- 저작권 표기 -->
      <div class="copyright">
        Copyright © DEPth MJU.<br/>All Rights Reserved
      </div>
    </footer>

  </div>
</body>
</html>
